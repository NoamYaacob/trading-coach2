        - generic [ref=e201]:
          - generic [ref=e202]:
            - paragraph [ref=e203]: FAQ
            - heading "Common questions." [level=2] [ref=e204]
          - generic [ref=e205]:
            - generic [ref=e206]:
              - heading "Is this a trading journal?" [level=3] [ref=e207]
              - paragraph [ref=e208]: No. A journal reviews what happened. Guardrail controls the session while it is happening. Post-session review is one component — the live enforcement layer is the core.
            - generic [ref=e209]:
              - heading "Does it connect to my broker?" [level=3] [ref=e210]
              - paragraph [ref=e211]: Not yet. The current build runs on a manual entry flow. Platform integration is on the roadmap, with the adapter layer already prepared for live connections.
            - generic [ref=e212]:
              - heading "How does the Telegram coach work?" [level=3] [ref=e213]
              - paragraph [ref=e214]: The bot reads your live Guardian status, session state, and loss streak before every reply. When you're locked out, it confirms the close. When you're mid-session under stress, it responds to that.
            - generic [ref=e215]:
              - heading "What happens during a Guardian lockout?" [level=3] [ref=e216]
              - paragraph [ref=e217]: The session closes for the day. You receive a lockout message in Telegram with the reason and reset window. There is no override path.
            - generic [ref=e218]:
              - heading "Who is this for?" [level=3] [ref=e219]
              - paragraph [ref=e220]: Active intraday traders — futures, equities, forex — who trade by defined rules and need those rules enforced in real time, not reviewed after the damage is done.
            - generic [ref=e221]:
              - heading "What is manual trade logging?" [level=3] [ref=e222]
              - paragraph [ref=e223]: Since live broker sync is not connected yet, you can log wins, losses, P&L, and rule breaches manually from the dashboard. These feed directly into Today Activity and Post-Session Review.
