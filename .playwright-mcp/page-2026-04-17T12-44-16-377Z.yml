          - generic [ref=e21]:
            - paragraph [ref=e22]: The problem
            - heading "Discipline breaks when it matters most." [level=2] [ref=e23]
            - paragraph [ref=e24]: Most traders don't lose from bad strategy. They lose from psychology — in the moments after a loss, under FOMO pressure, or after a small winning streak turns them overconfident.
          - generic [ref=e25]:
            - generic [ref=e26]:
              - paragraph [ref=e27]: "01"
              - heading "You know the rules. Under pressure, they disappear." [level=3] [ref=e28]
              - paragraph [ref=e29]: Rules are easy when the session is clean. The first loss is where discipline is actually tested — and most traders face it without a hard stop.
            - generic [ref=e30]:
              - paragraph [ref=e31]: "02"
              - heading "Journals review what happened. They don't stop it." [level=3] [ref=e32]
              - paragraph [ref=e33]: Post-trade journaling is valuable. But it's always too late. You need something watching the session live — not analyzing the damage after it's done.
            - generic [ref=e34]:
              - paragraph [ref=e35]: "03"
              - heading "One bad trade becomes a bad week." [level=3] [ref=e36]
              - paragraph [ref=e37]: Without hard stops, a loss triggers revenge, revenge triggers overtrading, and overtrading closes the month in the red. The cascade is predictable — the stop needs to be automatic.
        - generic [ref=e38]:
          - generic [ref=e39]:
            - paragraph [ref=e40]: What Guardrail does
            - heading "Every layer of the discipline system, built in." [level=2] [ref=e41]
          - generic [ref=e42]:
            - generic [ref=e43]:
              - paragraph [ref=e44]: Core system
              - heading "Guardian session control" [level=3] [ref=e45]
              - paragraph [ref=e46]: Define your daily limits once — max trades, max loss, consecutive losses. Guardian enforces them automatically. When a limit is crossed, the session closes.
            - generic [ref=e47]:
              - paragraph [ref=e48]: Enforcement
              - heading "Real-time lockout" [level=3] [ref=e49]
              - paragraph [ref=e50]: When Guardian triggers, trading is blocked for the day. There is no override. The decision was made before the pressure hit.
            - generic [ref=e51]:
              - paragraph [ref=e52]: Live coaching
              - heading "Telegram live coach" [level=3] [ref=e53]
              - paragraph [ref=e54]: The bot reads your live session state, Guardian status, and loss streak before every reply. Coaching is grounded in where you actually are.
            - generic [ref=e55]:
              - paragraph [ref=e56]: Risk awareness
              - heading "News-aware protection" [level=3] [ref=e57]
              - paragraph [ref=e58]: High-impact economic events are detected automatically. Depending on your policy, the system applies soft caution or a hard trading block before the window.
            - generic [ref=e59]:
              - paragraph [ref=e60]: Session record
              - heading "Today activity" [level=3] [ref=e61]
              - paragraph [ref=e62]: "Every meaningful session event is captured in a live timeline: state changes, Guardian triggers, manual trades, and session milestones — in order."
            - generic [ref=e63]:
              - paragraph [ref=e64]: Post-trade
              - heading "Post-session review" [level=3] [ref=e65]
              - paragraph [ref=e66]: "When the session closes, you get a structured review: the day's sequence, key moments, takeaways, and reset guidance for tomorrow."
